<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bikows CRM</title>
  <link rel="stylesheet" href="css/styles.css">
  <!-- Supabase JS SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>

<!-- ===== OVERLAY DE CARREGAMENTO ===== -->
<div id="loadingOverlay" style="display:flex;position:fixed;inset:0;z-index:9999;background:var(--bg,#f8fafc);align-items:center;justify-content:center;flex-direction:column;gap:16px;">
  <div style="width:48px;height:48px;border:4px solid var(--border,#e2e8f0);border-top-color:var(--primary,#2563eb);border-radius:50%;animation:spin 0.8s linear infinite"></div>
  <div id="loadingText" style="color:var(--text-muted,#64748b);font-size:14px;font-family:system-ui,sans-serif">Iniciando…</div>
</div>
<style>@keyframes spin{to{transform:rotate(360deg)}}</style>

<!-- ===== TELA DE LOGIN ===== -->
<div id="loginOverlay" style="display:none;position:fixed;inset:0;z-index:9998;background:var(--bg,#f8fafc);align-items:center;justify-content:center;">
  <div style="background:var(--surface,#fff);border:1px solid var(--border,#e2e8f0);border-radius:16px;padding:40px;width:100%;max-width:400px;box-shadow:0 8px 32px rgba(0,0,0,.12);">
    <div style="text-align:center;margin-bottom:32px;">
      <div style="margin-bottom:12px;"><img src="img/logo-bikows.png" alt="Bikows" style="height:90px;width:auto;"></div>
      <h2 style="font-size:22px;font-weight:700;color:var(--text,#0f172a);margin:0 0 4px">Bikows CRM</h2>
      <p style="color:var(--text-muted,#64748b);font-size:13px;margin:0">Acesse com seu e-mail e senha</p>
    </div>

    <div style="display:flex;flex-direction:column;gap:14px;">
      <div>
        <label style="display:block;font-size:12px;font-weight:600;color:var(--text,#0f172a);margin-bottom:6px;">E-mail</label>
        <input id="loginEmail" type="email" placeholder="seu@email.com.br"
          style="width:100%;box-sizing:border-box;padding:10px 14px;border:1px solid var(--border,#e2e8f0);border-radius:8px;font-size:14px;background:var(--bg,#f8fafc);color:var(--text,#0f172a);"
          onkeydown="Auth.handleKeydown(event)">
      </div>
      <div>
        <label style="display:block;font-size:12px;font-weight:600;color:var(--text,#0f172a);margin-bottom:6px;">Senha</label>
        <input id="loginPassword" type="password" placeholder="••••••••"
          style="width:100%;box-sizing:border-box;padding:10px 14px;border:1px solid var(--border,#e2e8f0);border-radius:8px;font-size:14px;background:var(--bg,#f8fafc);color:var(--text,#0f172a);"
          onkeydown="Auth.handleKeydown(event)">
      </div>

      <div id="loginError" style="display:none;font-size:13px;color:var(--danger,#dc2626);padding:8px 12px;background:#fef2f2;border-radius:8px;border:1px solid #fecaca;"></div>

      <button id="loginBtn" onclick="Auth.login()"
        style="width:100%;padding:12px;background:var(--primary,#2563eb);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;margin-top:4px;">
        Entrar
      </button>

      <div style="text-align:center;">
        <button onclick="Auth.resetPassword()"
          style="background:none;border:none;color:var(--primary,#2563eb);font-size:12px;cursor:pointer;text-decoration:underline;">
          Esqueci minha senha
        </button>
      </div>
    </div>
  </div>
</div>

<!-- ===== APP ===== -->
<div id="appLayout" style="display:none;">
<div class="app-layout">

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="brand">
        <img src="img/logo-bikows.png" alt="Bikows" style="height:32px;width:auto;flex-shrink:0;">
        <div class="brand-text" id="brandName">Bikows CRM</div>
      </div>
      <button class="sidebar-collapse-btn" onclick="App.toggleSidebar()" title="Recolher menu" id="sidebarCollapseBtn">
        <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </button>
    </div>
    <nav class="sidebar-nav" id="sidebarNav">
      <a class="nav-link active" data-page="dashboard" href="#">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        <span>Dashboard</span>
      </a>
      <a class="nav-link" data-page="pipeline" href="#">
        <svg viewBox="0 0 24 24"><path d="M4 6h16M4 10h16M4 14h16M4 18h16"/></svg>
        <span>Pipeline CRM</span>
      </a>
      <a class="nav-link" data-page="clientes" href="#">
        <svg viewBox="0 0 24 24"><path d="M3 21V5a2 2 0 012-2h14a2 2 0 012 2v16M7 10h4M7 14h4M13 10h4M13 14h4"/></svg>
        <span>Clientes</span>
      </a>
      <a class="nav-link" data-page="contatos" href="#">
        <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2M9 11a4 4 0 100-8 4 4 0 000 8zM23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>
        <span>Contatos</span>
      </a>
      <a class="nav-link" data-page="projetos" href="#">
        <svg viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 012-2h2a2 2 0 012 2M9 5h6M9 12l2 2 4-4"/></svg>
        <span>Projetos</span>
      </a>
      <a class="nav-link" data-page="atividades" href="#">
        <svg viewBox="0 0 24 24"><path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/></svg>
        <span>Atividades</span>
      </a>
      <a class="nav-link" data-page="propostas" href="#">
        <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8zM14 2v6h6M16 13H8M16 17H8M10 9H8"/></svg>
        <span>Propostas</span>
      </a>
      <a class="nav-link" data-page="financeiro" href="#">
        <svg viewBox="0 0 24 24"><path d="M12 1v22M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>
        <span>Financeiro</span>
      </a>
      <a class="nav-link" data-page="rh" href="#">
        <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2M9 11a4 4 0 100-8 4 4 0 000 8zM23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>
        <span>RH / Folha</span>
      </a>
      <a class="nav-link" data-page="calendario" href="#">
        <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        <span>Calendário</span>
      </a>
      <a class="nav-link" data-page="licitacoes" href="#">
        <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        <span>Licitações</span>
      </a>
      <a class="nav-link" data-page="relatorios" href="#">
        <svg viewBox="0 0 24 24"><path d="M18 20V10M12 20V4M6 20v-6"/></svg>
        <span>Relatórios</span>
      </a>
    </nav>
    <div class="sidebar-bottom">
      <a class="nav-link" data-page="config" href="#">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93l-1.41 1.41M4.93 4.93l1.41 1.41M19.07 19.07l-1.41-1.41M4.93 19.07l1.41-1.41M1 12h2M21 12h2M12 1v2M12 21v2"/></svg>
        <span>Configurações</span>
      </a>
      <div class="user-card">
        <div class="user-avatar-sm" id="sidebarAvatar">U</div>
        <div class="user-meta">
          <div class="user-name-sm" id="sidebarName">Usuário</div>
          <div class="user-role-sm" id="sidebarRole">Admin</div>
        </div>
        <button onclick="Auth.logout()" title="Sair" style="background:none;border:none;cursor:pointer;color:var(--text-muted);font-size:16px;padding:4px;line-height:1;" title="Sair">⏻</button>
      </div>
    </div>
  </aside>

  <!-- MAIN -->
  <div class="main-area">
    <header class="top-bar">
      <div class="top-left">
        <button class="toggle-btn" onclick="App.toggleSidebar()">☰</button>
        <h1 class="page-title" id="pageTitle">Dashboard</h1>
      </div>
      <div class="top-right">
        <div class="search-wrap">
          <div class="search-box">
            <span class="search-icon">🔍</span>
            <input type="search" class="search-input" placeholder="Buscar..." id="globalSearch" oninput="App.search(this.value)">
          </div>
          <div id="searchPanel" class="search-panel"></div>
        </div>
        <button class="btn btn-primary" id="btnAddNew">+ Novo</button>
        <button class="notif-btn" id="notifBtn" title="Ver pendências" onclick="App.showPendencias()">
          🔔 <span class="notif-badge" id="notifBadge">0</span>
        </button>
        <button class="dark-toggle" id="darkToggle" onclick="App.toggleDark()" title="Alternar modo escuro">🌙</button>
      </div>
    </header>
    <main class="page-content" id="pageContent"></main>
  </div>
</div>

<!-- MODAL -->
<div class="backdrop" id="modalBackdrop" onclick="Modal.backdropClick(event)">
  <div class="modal-box" id="modalBox">
    <div class="modal-head">
      <h3 class="modal-title" id="modalTitle">Título</h3>
      <button class="close-btn" onclick="Modal.close()">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-foot" id="modalFoot">
      <button class="btn btn-ghost" onclick="Modal.close()">Cancelar</button>
      <button class="btn btn-primary" id="btnModalSave">Salvar</button>
    </div>
  </div>
</div>

<!-- CONFIRM -->
<div class="backdrop" id="confirmBackdrop" onclick="Confirm.close()">
  <div class="modal-box modal-sm">
    <div class="modal-head">
      <h3 id="confirmTitle">Confirmar</h3>
      <button class="close-btn" onclick="Confirm.close()">✕</button>
    </div>
    <div class="modal-body"><p id="confirmMsg"></p></div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="Confirm.close()">Cancelar</button>
      <button class="btn btn-danger" id="btnConfirm">Confirmar</button>
    </div>
  </div>
</div>

<!-- TOASTS -->
<div class="toast-stack" id="toastStack"></div>

</div><!-- /#appLayout -->

<!-- SCRIPTS -->
<script src="js/supabase-client.js"></script>
<script src="js/db.js"></script>
<script src="js/auth.js"></script>
<script src="js/utils.js"></script>
<script src="js/charts.js"></script>
<script src="js/modules/dashboard.js"></script>
<script src="js/modules/pipeline.js"></script>
<script src="js/modules/clientes.js"></script>
<script src="js/modules/contatos.js"></script>
<script src="js/modules/projetos.js"></script>
<script src="js/modules/atividades.js"></script>
<script src="js/modules/propostas.js"></script>
<script src="js/modules/proposta_generator.js"></script>
<script src="js/modules/financeiro.js"></script>
<script src="js/modules/folha.js"></script>
<script src="js/modules/calendario.js"></script>
<script src="js/modules/google-cal.js"></script>
<script src="js/modules/licitacoes.js"></script>
<script src="js/modules/relatorios.js"></script>
<script src="js/modules/config.js"></script>
<script src="js/app.js"></script>
</body>
</html>
